<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panorama · Supervisor d'operacions.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F6F5F2;
      --bg-tint: #FBFAF8;
      --surface: #FFFFFF;
      --surface-2: #F2F1ED;
      --ink: #1B1924;
      --dim: #65616F;
      --faint: #9C98A6;
      --line: rgba(27, 25, 36, .09);
      --line-2: rgba(27, 25, 36, .16);
      --accent: #6A5BE8;
      --accent-soft: rgba(106, 91, 232, .10);
      --ok: #15A06A;
      --ok-soft: rgba(21, 160, 106, .10);
      --watch: #D9981F;
      --watch-soft: rgba(217, 152, 31, .12);
      --alert: #E05641;
      --alert-soft: rgba(224, 86, 65, .10);
      --off: #B7B3C0;
      --r: 16px;
      --r-sm: 10px;
      --ease: cubic-bezier(.22, .61, .36, 1);
      --shadow: 0 1px 2px rgba(27, 25, 36, .04), 0 4px 16px rgba(27, 25, 36, .05);
      --shadow-lift: 0 8px 30px rgba(27, 25, 36, .10);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      background-image: radial-gradient(1100px 600px at 75% -15%, rgba(106, 91, 232, .05), transparent 60%);
      background-attachment: fixed;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums
    }

    ::selection {
      background: var(--accent-soft)
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    /* ── Top bar ── */
    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 248, .8);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 40
    }

    .brand {
      display: flex;
      align-items: center;
      cursor: pointer
    }

    .brand-logo {
      height: 28px;
      width: auto;
      display: block
    }

    nav {
      display: flex;
      gap: 1px;
      margin-left: 4px
    }

    nav button {
      padding: 7px 13px;
      border-radius: 8px;
      color: var(--dim);
      font-size: 13px;
      font-weight: 500;
      transition: .16s var(--ease)
    }

    nav button:hover {
      color: var(--ink);
      background: rgba(27, 25, 36, .04)
    }

    nav button.on {
      color: var(--ink);
      background: var(--accent-soft)
    }

    .top-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px
    }

    .qsearch {
      position: relative
    }

    .qsearch input {
      width: 200px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 7px 11px 7px 31px;
      font-size: 13px;
      color: var(--ink);
      outline: none;
      transition: .16s
    }

    .qsearch input::placeholder {
      color: var(--faint)
    }

    .qsearch input:focus {
      width: 240px;
      border-color: rgba(106, 91, 232, .4);
      box-shadow: 0 0 0 3px var(--accent-soft)
    }

    .qsearch svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--faint)
    }

    .clock {
      font-family: 'JetBrains Mono';
      font-size: 13px;
      color: var(--dim)
    }

    .me {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .me .av {
      width: 29px;
      height: 29px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6a5be8, #a98aff);
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      font-family: 'Space Grotesk'
    }

    /* ── Overview ── */
    .ov {
      max-width: 920px;
      margin: 0 auto;
      padding: 64px 26px 80px
    }

    .hello {
      font-family: 'Space Grotesk';
      font-size: 16px;
      color: var(--dim);
      font-weight: 500;
      margin-bottom: 20px
    }

    .verdict {
      display: flex;
      align-items: flex-start;
      gap: 18px
    }

    .vdot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-top: 14px;
      flex-shrink: 0;
      position: relative
    }

    .vdot.ok {
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(21, 160, 106, .4);
      animation: calm 3.2s var(--ease) infinite
    }

    .vdot.watch {
      background: var(--watch)
    }

    .vdot.alert {
      background: var(--alert);
      animation: throb 1.4s infinite
    }

    @keyframes calm {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(21, 160, 106, .35)
      }

      50% {
        box-shadow: 0 0 0 8px rgba(21, 160, 106, 0)
      }
    }

    @keyframes throb {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(224, 86, 65, .5)
      }

      50% {
        box-shadow: 0 0 0 9px rgba(224, 86, 65, 0)
      }
    }

    .verdict h1 {
      font-family: 'Space Grotesk';
      font-size: 46px;
      font-weight: 600;
      letter-spacing: -.025em;
      line-height: 1.05
    }

    .vsub {
      color: var(--dim);
      font-size: 16px;
      margin-top: 14px;
      max-width: 560px;
      line-height: 1.55
    }

    .vmeta {
      color: var(--faint);
      font-size: 13px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .vmeta .live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ok);
      font-weight: 500
    }

    .vmeta .live i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok)
    }

    .pillars {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-top: 48px
    }

    .pillar {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 18px 18px 16px;
      text-align: left;
      transition: .2s var(--ease);
      position: relative;
      overflow: hidden
    }

    .pillar:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lift);
      border-color: var(--line-2)
    }

    .pillar .pl {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--faint);
      font-weight: 600
    }

    .pillar .pv {
      font-family: 'JetBrains Mono';
      font-size: 30px;
      font-weight: 500;
      letter-spacing: -.03em;
      margin-top: 12px;
      line-height: 1
    }

    .pillar .pv .u {
      font-size: 14px;
      color: var(--faint);
      font-weight: 400
    }

    .pillar .ps {
      font-size: 12.5px;
      margin-top: 9px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--dim)
    }

    .pillar .ps i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .pillar.attn {
      box-shadow: inset 0 0 0 1px currentColor
    }

    .pillar.attn.watch {
      background: var(--watch-soft);
      color: var(--watch)
    }

    .pillar.attn.alert {
      background: var(--alert-soft);
      color: var(--alert)
    }

    .pillar.attn .pv {
      color: var(--ink)
    }

    .pillar .arrow {
      position: absolute;
      top: 16px;
      right: 16px;
      color: var(--faint);
      opacity: 0;
      transition: .2s
    }

    .pillar:hover .arrow {
      opacity: 1;
      transform: translateX(2px)
    }

    .ovcta {
      margin-top: 34px;
      display: flex;
      gap: 12px;
      align-items: center
    }

    .ovcta button {
      padding: 11px 18px;
      border-radius: 11px;
      font-size: 13.5px;
      font-weight: 500;
      transition: .16s
    }

    .ovcta .ghost {
      color: var(--dim);
      border: 1px solid var(--line)
    }

    .ovcta .ghost:hover {
      color: var(--ink);
      border-color: var(--line-2);
      background: var(--surface)
    }

    /* ── Detail views ── */
    .view {
      max-width: 1240px;
      margin: 0 auto;
      padding: 26px 26px 70px
    }

    .view-ops {
      max-width: none;
      margin: 0;
      padding: 0;
      height: calc(100vh - 58px);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .view-ops .vhead {
      flex-shrink: 0;
      padding: 18px 26px 14px;
      margin-bottom: 0
    }

    .ops-layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(380px, 40%) 1fr;
      min-height: 0;
      overflow: hidden
    }

    .ops-room {
      overflow-y: auto;
      overscroll-behavior: contain;
      border-right: 1px solid var(--line);
      padding: 16px 20px 24px;
      background: var(--bg-tint)
    }

    .ops-data {
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 16px 26px 40px
    }

    .ops-data .qgrid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr))
    }

    .ops-data .grid {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr))
    }

    .ops-building.building-stage {
      margin-top: 0
    }

    .ops-building .room-canvas svg {
      max-width: 100%
    }

    .vhead {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 22px
    }

    .vhead h2 {
      font-family: 'Space Grotesk';
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -.02em
    }

    .vhead .back {
      font-size: 13px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 6px
    }

    .vhead .back:hover {
      color: var(--accent)
    }

    .vhead .count {
      color: var(--faint);
      font-size: 14px;
      font-family: 'JetBrains Mono'
    }

    .view section {
      margin-bottom: 36px
    }

    .sec-title {
      font-family: 'Space Grotesk';
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 9px
    }

    .sec-title .cnt {
      font-family: 'JetBrains Mono';
      font-size: 12px;
      color: var(--faint);
      font-weight: 500
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap
    }

    .seg {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 3px
    }

    .seg button {
      padding: 6px 13px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--dim);
      transition: .15s
    }

    .seg button.on {
      background: var(--surface-2);
      color: var(--ink)
    }

    .chips {
      display: flex;
      gap: 7px;
      flex-wrap: wrap
    }

    .chip {
      padding: 6px 11px;
      border-radius: 20px;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      transition: .15s
    }

    .chip:hover {
      border-color: var(--line-2);
      color: var(--ink)
    }

    .chip.on {
      background: var(--accent-soft);
      border-color: rgba(106, 91, 232, .3);
      color: var(--accent)
    }

    .chip i {
      width: 7px;
      height: 7px;
      border-radius: 50%
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
      gap: 13px
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 15px;
      position: relative;
      transition: transform .22s var(--ease), box-shadow .22s, border-color .22s;
      cursor: pointer;
      box-shadow: var(--shadow)
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lift);
      border-color: var(--line-2)
    }

    .card.flagged {
      border-color: rgba(224, 86, 65, .4);
      box-shadow: 0 0 0 1px rgba(224, 86, 65, .18), var(--shadow)
    }

    .card-top {
      display: flex;
      gap: 12px;
      align-items: center
    }

    .ring {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0
    }

    .ring svg {
      transform: rotate(-90deg)
    }

    .ring .face {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: 'Space Grotesk';
      font-weight: 600;
      font-size: 13px;
      color: #fff;
      overflow: hidden
    }

    .ring .face img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .ring.breathe .face {
      animation: breathe 3.4s var(--ease) infinite
    }

    @keyframes breathe {

      0%,
      100% {
        box-shadow: 0 0 0 0 var(--st)
      }

      50% {
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--st) 22%, transparent)
      }
    }

    .who {
      flex: 1;
      min-width: 0
    }

    .who .nm {
      font-family: 'Space Grotesk';
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .who .rl {
      font-size: 11.5px;
      color: var(--faint);
      margin-top: 1px
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 6px
    }

    .status-pill i {
      width: 6px;
      height: 6px;
      border-radius: 50%
    }

    .cap {
      margin-top: 14px
    }

    .cap-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 5px
    }

    .cap-head b {
      font-family: 'JetBrains Mono';
      color: var(--ink);
      font-size: 12px;
      font-weight: 500
    }

    .cap-bar {
      height: 6px;
      border-radius: 6px;
      background: var(--surface-2);
      overflow: hidden;
      display: flex;
      gap: 2px
    }

    .cap-bar span {
      height: 100%;
      border-radius: 2px
    }

    .chan {
      display: flex;
      gap: 6px;
      margin-top: 13px
    }

    .chan .c {
      flex: 1;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 6px 0;
      text-align: center
    }

    .chan .c .ic {
      font-size: 13px;
      opacity: .7
    }

    .chan .c .n {
      font-family: 'JetBrains Mono';
      font-size: 12px;
      font-weight: 500;
      margin-top: 1px
    }

    .chan .c.active {
      background: var(--accent-soft);
      color: var(--accent)
    }

    .chan .c.zero {
      opacity: .45
    }

    .work {
      margin-top: 13px;
      border-top: 1px solid var(--line);
      padding-top: 11px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px
    }

    .work .wic {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
      font-size: 13px;
      flex-shrink: 0
    }

    .work .wt {
      flex: 1;
      min-width: 0;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .work .wt b {
      color: var(--ink);
      font-weight: 500
    }

    .work .timer {
      font-family: 'JetBrains Mono';
      font-size: 12px;
      color: var(--watch)
    }

    .flag-badge {
      position: absolute;
      top: 13px;
      right: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--alert);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: .03em;
      animation: throb 1.6s infinite
    }

    .foot {
      display: flex;
      justify-content: space-between;
      margin-top: 11px;
      font-size: 10.5px;
      color: var(--faint)
    }

    .foot b {
      color: var(--dim)
    }

    /* queues view */
    .qgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 13px
    }

    .qcard {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 18px;
      box-shadow: var(--shadow);
      transition: .2s var(--ease);
      cursor: pointer
    }

    .qcard:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lift)
    }

    .qcard .qtop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px
    }

    .qcard .qn {
      font-family: 'Space Grotesk';
      font-weight: 600;
      font-size: 16px
    }

    .qcard .qa {
      font-size: 11px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 5px
    }

    .qcard .qa i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ok)
    }

    .qcard .qa b {
      font-family: 'JetBrains Mono';
      color: var(--ink)
    }

    .pressure {
      height: 6px;
      border-radius: 6px;
      background: var(--surface-2);
      overflow: hidden;
      margin-bottom: 16px
    }

    .pressure span {
      display: block;
      height: 100%;
      border-radius: 6px;
      transition: width .6s var(--ease)
    }

    .qmetrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px
    }

    .qmetrics .m .v {
      font-family: 'JetBrains Mono';
      font-size: 18px;
      font-weight: 500
    }

    .qmetrics .m .v.warn {
      color: var(--alert)
    }

    .qmetrics .m .k {
      font-size: 10.5px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-top: 2px
    }

    .placeholder {
      padding: 80px 24px;
      text-align: center;
      color: var(--faint)
    }

    .placeholder h3 {
      font-family: 'Space Grotesk';
      color: var(--ink);
      font-size: 20px;
      margin-bottom: 8px;
      font-weight: 600
    }

    .placeholder p {
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6
    }

    /* drawer */
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(27, 25, 36, .32);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: .25s;
      z-index: 50
    }

    .scrim.show {
      opacity: 1;
      pointer-events: auto
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 440px;
      max-width: 92vw;
      background: var(--bg-tint);
      border-left: 1px solid var(--line);
      z-index: 51;
      transform: translateX(100%);
      transition: transform .32s var(--ease);
      overflow-y: auto;
      box-shadow: -30px 0 60px rgba(27, 25, 36, .15)
    }

    .drawer.show {
      transform: none
    }

    .dr-head {
      padding: 22px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      background: rgba(251, 250, 248, .92);
      backdrop-filter: blur(8px);
      z-index: 2
    }

    .dr-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--dim);
      background: var(--surface);
      border: 1px solid var(--line);
      transition: .15s
    }

    .dr-close:hover {
      color: var(--ink);
      border-color: var(--line-2)
    }

    .dr-id {
      display: flex;
      gap: 14px;
      align-items: center
    }

    .dr-id .nm {
      font-family: 'Space Grotesk';
      font-size: 20px;
      font-weight: 600
    }

    .dr-id .rl {
      color: var(--dim);
      font-size: 13px;
      margin-top: 2px
    }

    .dr-actions {
      display: flex;
      gap: 8px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap
    }

    .dr-actions button {
      padding: 8px 13px;
      border-radius: 9px;
      font-size: 12.5px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink);
      transition: .15s
    }

    .dr-actions button:hover {
      border-color: var(--line-2);
      box-shadow: var(--shadow)
    }

    .dr-actions button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .dr-body {
      padding: 22px
    }

    .dr-body section {
      margin-bottom: 26px
    }

    .dr-body h4 {
      font-family: 'Space Grotesk';
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--faint);
      font-weight: 600;
      margin-bottom: 13px
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px
    }

    .stat-grid .s {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 13px 14px
    }

    .stat-grid .s .v {
      font-family: 'JetBrains Mono';
      font-size: 19px;
      font-weight: 500
    }

    .stat-grid .s .k {
      font-size: 10.5px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-top: 3px
    }

    .tl-axis {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono';
      font-size: 10px;
      color: var(--faint);
      margin-bottom: 6px
    }

    .tl-track {
      position: relative;
      height: 34px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden
    }

    .tl-lane-lbl {
      font-size: 10.5px;
      color: var(--dim);
      margin: 10px 0 4px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .tl-block {
      position: absolute;
      top: 4px;
      bottom: 4px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      padding: 0 7px;
      font-size: 10.5px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      color: #fff
    }

    .tl-now {
      position: absolute;
      top: -3px;
      bottom: -3px;
      width: 2px;
      background: var(--accent);
      z-index: 3
    }

    .pill-q {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px
    }

    .worklist .wi {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line)
    }

    .worklist .wi:last-child {
      border: none
    }

    .worklist .wi .wic {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      font-size: 15px;
      flex-shrink: 0
    }

    .worklist .wi .info {
      flex: 1;
      min-width: 0
    }

    .worklist .wi .info .t {
      font-size: 13px;
      font-weight: 500
    }

    .worklist .wi .info .m {
      font-size: 11px;
      color: var(--faint)
    }

    .worklist .wi .age {
      font-family: 'JetBrains Mono';
      font-size: 12px;
      color: var(--dim)
    }

    /* room — killer feature */
    .room-view .vhead .summary {
      margin-left: auto;
      font-size: 13px;
      color: var(--dim);
      display: flex;
      gap: 16px
    }

    .room-view .summary b {
      font-family: 'JetBrains Mono';
      color: var(--ink)
    }

    .room-tabs {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 18px
    }

    .room-tabs button {
      padding: 7px 14px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--dim);
      transition: .15s
    }

    .room-tabs button.on {
      background: var(--surface-2);
      color: var(--ink)
    }

    .room-stage {
      position: relative;
      background: radial-gradient(1000px 600px at 50% 18%, rgba(106, 91, 232, .06), transparent 70%), var(--bg-tint);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 26px;
      overflow: hidden;
      box-shadow: var(--shadow)
    }

    .room-canvas {
      width: 100%;
      display: flex;
      justify-content: center
    }

    .room-canvas svg {
      width: 100%;
      max-width: 880px;
      height: auto;
      overflow: visible
    }

    .seat polygon {
      transition: stroke .12s, filter .12s
    }

    .seat[data-id] {
      cursor: pointer
    }

    .seat[data-id]:hover polygon {
      stroke: var(--ink);
      stroke-width: 1.4
    }

    .beacon {
      animation: beat 1.3s infinite
    }

    @keyframes beat {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .room-tip {
      position: fixed;
      z-index: 60;
      display: none;
      background: var(--ink);
      color: #fff;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 12px;
      pointer-events: none;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .28);
      max-width: 230px
    }

    .room-tip .tn {
      font-family: 'Space Grotesk';
      font-weight: 600;
      font-size: 13px
    }

    .room-tip .tm {
      color: rgba(255, 255, 255, .65);
      font-size: 11px;
      margin-top: 1px
    }

    .room-tip .tl {
      margin-top: 6px;
      font-family: 'JetBrains Mono';
      font-size: 11px;
      color: rgba(255, 255, 255, .9)
    }

    .room-tip .tip-row {
      display: flex;
      align-items: center;
      gap: 9px
    }

    .room-tip .tip-av {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, .18)
    }

    .room-legend {
      position: absolute;
      bottom: 18px;
      right: 18px;
      background: rgba(255, 255, 255, .82);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 14px 16px;
      font-size: 11.5px;
      color: var(--dim);
      width: 210px
    }

    .room-legend .lt {
      font-family: 'Space Grotesk';
      font-weight: 600;
      color: var(--ink);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 9px
    }

    .room-legend .bar {
      height: 8px;
      border-radius: 6px;
      background: linear-gradient(90deg, rgb(182, 200, 224), rgb(40, 178, 120), rgb(224, 176, 52), rgb(224, 96, 72), rgb(196, 42, 52))
    }

    .room-legend .ends {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--faint);
      margin-top: 4px
    }

    .room-legend .li {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 9px;
      line-height: 1.3
    }

    .room-legend .li i {
      flex-shrink: 0
    }

    .building-stage {
      position: relative;
      margin-top: 40px;
      background: radial-gradient(900px 600px at 50% 32%, rgba(106, 91, 232, .05), transparent 70%), var(--bg-tint);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 20px 24px 26px;
      box-shadow: var(--shadow);
      overflow: hidden
    }

    .bldg-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px
    }

    .bldg-head .bcap {
      font-family: 'Space Grotesk';
      font-weight: 600;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--faint)
    }

    .bldg-head .bstats {
      font-size: 12.5px;
      color: var(--dim)
    }

    .bldg-head .bstats b {
      font-family: 'JetBrains Mono';
      color: var(--ink)
    }

    .bldg-compass {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px
    }

    .bldg-compass button {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--faint);
      transition: .12s var(--ease);
      display: grid;
      place-items: center;
      line-height: 1
    }

    .bldg-compass button:hover {
      background: var(--surface-2);
      color: var(--ink)
    }

    .bldg-compass button.on {
      background: var(--accent-soft);
      color: var(--accent)
    }

    .floor-lbl {
      font-family: 'Space Grotesk';
      font-size: 11px;
      fill: var(--faint);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 600
    }

    .scene3d {
      width: 100%;
      height: 540px;
      touch-action: none;
      cursor: grab;
      border-radius: 12px
    }

    .scene3d:active {
      cursor: grabbing
    }

    .scene3d canvas {
      display: block;
      border-radius: 12px
    }

    .ctrls-hint {
      margin-top: 11px;
      font-size: 11px;
      color: var(--faint);
      text-align: center;
      letter-spacing: .02em
    }

    @media (max-width:1100px) {
      .ops-layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(280px, 42vh) 1fr
      }

      .ops-room {
        border-right: none;
        border-bottom: 1px solid var(--line)
      }
    }

    @media (max-width:880px) {
      .pillars {
        grid-template-columns: repeat(2, 1fr)
      }

      .verdict h1 {
        font-size: 36px
      }

      .qsearch input,
      .qsearch input:focus {
        width: 130px
      }

      nav .txt {
        display: none
      }
    }

    @media (prefers-reduced-motion:reduce) {
      * {
        animation: none !important;
        transition: none !important
      }
    }
  </style>
</head>

7H/2Q=="];

    let AGENTS = NAMES.map((n, i) => {
      const N = NAMES.length; const st = i < N * .6 ? 'online' : (i < N * .72 ? 'busy' : (i < N * .84 ? 'away' : 'offline'));
      const max = pick([4, 5, 5, 6]);
      const used = st === 'offline' ? 0 : (st === 'away' ? rnd(0, 1) : rnd(1, max));
      const chans = { veu: 0, chat: 0, email: 0, wa: 0, cas: 0 };
      let left = used; while (left > 0) { chans[pick(['veu', 'chat', 'wa', 'cas', 'email'])]++; left--; }
      const wk = used > 0 ? { ...pick(WORK_KINDS) } : null; if (wk && wk.t === 'Cas #') wk.t = 'Cas #' + rnd(48210, 48999);
      return {
        id: 'a' + i, name: n[0], role: n[1], status: st, max, used, chans, queues: [pick(QUEUES).id, pick(QUEUES).id], photo: PHOTOS[i % PHOTOS.length],
        work: wk, workSec: wk ? rnd(40, 900) : 0, loginMin: st === 'offline' ? 0 : rnd(25, 380),
        lastAccept: st === 'offline' ? null : rnd(0, 40), flag: false, flagReason: null
      };
    });
    let queueState = QUEUES.map(q => ({
      ...q, backlog: rnd(1, 9), longest: rnd(20, 150), avg: rnd(20, 90),
      online: AGENTS.filter(a => a.queues.includes(q.id) && a.status === 'online').length || rnd(1, 4)
    }));

    /* floors: each defines its footprint cells + desk seats */
    function floorBaixa() {
      const cells = []; for (let r = 0; r < 7; r++)for (let c = 0; c < 11; c++)cells.push([c, r]);
      const seats = [];[1, 3, 5].forEach(r => [1, 2, 4, 5, 7, 8, 10].forEach(c => seats.push([c, r]))); return { name: 'Planta baixa', cells, seats };
    }
    function floorPrimera() {
      const cells = []; for (let r = 0; r < 7; r++)for (let c = 0; c < 7; c++)cells.push([c, r]);
      for (let r = 0; r < 4; r++)for (let c = 7; c < 11; c++)cells.push([c, r]);
      const seats = [];[1, 3, 5].forEach(r => [1, 2, 4, 5].forEach(c => seats.push([c, r])));[1, 3].forEach(r => [8, 9].forEach(c => seats.push([c, r])));
      return { name: 'Primera planta · L', cells, seats };
    }
    const FLOORS = [floorBaixa(), floorPrimera()];
    (function () {
      const order = ['Atenció', 'Incidències', 'Vendes', 'Suport', 'Retenció'];
      const sorted = AGENTS.slice().sort((a, b) => order.indexOf(teamOf(a)) - order.indexOf(teamOf(b)));
      let k = 0; FLOORS.forEach(f => { f.cellset = new Set(f.cells.map(([c, r]) => c + ',' + r)); f.assigned = f.seats.map(([c, r]) => ({ c, r, agent: sorted[k++] || null })); });
    })();

    /* ───────── Helpers ───────── */
    const fmtDur = s => { const m = Math.floor(s / 60); return m + ':' + String(s % 60).padStart(2, '0'); };
    const fmtWait = s => s < 60 ? s + 's' : Math.floor(s / 60) + 'm ' + String(s % 60).padStart(2, '0') + 's';
    const fmtWaitShort = s => s < 60 ? s + 's' : Math.floor(s / 60) + 'm ' + (s % 60 ? String(s % 60).padStart(2, '0') + 's' : '');
    const fmtLogin = m => { const h = Math.floor(m / 60); return h > 0 ? h + 'h ' + (m % 60) + 'm' : m + 'm'; };
    const initials = n => n.split(' ').map(w => w[0]).slice(0, 2).join('');
    const avGrad = i => [['#6a5be8', '#a98aff'], ['#15a06a', '#3ac88a'], ['#e05641', '#ff8f6b'], ['#d9981f', '#f2c14e'], ['#a98aff', '#e05641']][i % 5];
    const qById = id => QUEUES.find(q => q.id === id);
    function ringSVG(used, max, color, size = 48) {
      const r = (size - 6) / 2, c = 2 * Math.PI * r, f = max ? used / max : 0;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="3.5"/><circle cx="${size / 2}" cy="${size / 2}" r="${r}" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c * (1 - f)}" style="transition:stroke-dashoffset .6s var(--ease)"/></svg>`;
    }

    /* ───────── Health computation ───────── */
    function health() {
      const online = AGENTS.filter(a => a.status === 'online').length;
      const backlog = queueState.reduce((s, q) => s + q.backlog, 0);
      const longest = Math.max(...queueState.map(q => q.longest));
      const totCap = AGENTS.filter(a => a.status !== 'offline').reduce((s, a) => s + a.max, 0);
      const totUsed = AGENTS.reduce((s, a) => s + a.used, 0);
      const util = Math.round(totUsed / totCap * 100);
      const flags = AGENTS.filter(a => a.flag).length;
      const sla = Math.max(70, Math.min(99, 98 - Math.round(backlog * .9) - (longest > 180 ? 6 : 0)));
      const lvl = (v, w, a) => v >= a ? 'alert' : v >= w ? 'watch' : 'ok';
      const pillars = [
        {
          id: 'wait', view: 'queues', lbl: 'Espera', val: fmtWaitShort(longest), raw: longest, state: lvl(longest, 150, 240),
          msg: { ok: 'dins de marge', watch: 'pujant', alert: 'per sobre del llindar' }
        },
        {
          id: 'backlog', view: 'queues', lbl: 'Backlog', val: backlog, raw: backlog, state: lvl(backlog, 18, 30),
          msg: { ok: 'estable', watch: 'creixent', alert: 'acumulant-se' }
        },
        {
          id: 'cover', view: 'agents', lbl: 'Cobertura', val: util + '%', raw: util, state: lvl(util, 82, 93),
          msg: { ok: 'folgada', watch: 'ajustada', alert: 'al límit' }
        },
        {
          id: 'sla', view: 'queues', lbl: 'SLA', val: sla + '%', raw: sla, state: sla >= 90 ? 'ok' : sla >= 80 ? 'watch' : 'alert',
          msg: { ok: 'complint', watch: 'al caire', alert: 'incomplint' }
        },
        {
          id: 'help', view: 'agents', lbl: 'Ajuda', val: flags, raw: flags, state: flags === 0 ? 'ok' : flags <= 1 ? 'watch' : 'alert',
          msg: { ok: 'cap petició', watch: '1 agent espera', alert: flags + ' agents esperen' }
        },
      ];
      const worst = pillars.reduce((w, p) => ({ ok: 0, watch: 1, alert: 2 }[p.state] > { ok: 0, watch: 1, alert: 2 }[w] ? p.state : w), 'ok');
      return { online, backlog, longest, util, flags, sla, pillars, worst };

      const st = STATUS[a.status]; const [g1, g2] = avGrad(NAMES.findIndex(n => n[0] === a.name));
      const items = Array.from({ length: Math.max(1, a.used || 1) }).map(() => { const w = { ...pick(WORK_KINDS) }; if (w.t === 'Cas #') w.t = 'Cas #' + rnd(48210, 48999); return { ...w, age: rnd(1, 28) }; });
      const stB = [{ l: 0, w: 22, c: '#B7B3C0', t: 'Desconnectat' }, { l: 22, w: 30, c: '#15A06A', t: 'Online' }, { l: 52, w: 14, c: '#D9981F', t: 'Pausa' }, { l: 66, w: 34, c: '#15A06A', t: 'Online' }];
      const wkB = [{ l: 24, w: 16, c: '#6A5BE8', t: 'Cas' }, { l: 42, w: 9, c: '#E05641', t: '☎' }, { l: 55, w: 11, c: '#15A06A', t: '💬' }, { l: 70, w: 18, c: '#6A5BE8', t: '☎' }, { l: 90, w: 8, c: '#D9981F', t: '' }];
      document.getElementById('drawer').innerHTML = `
    <div class="dr-head"><button class="dr-close" onclick="closeDrawer()">✕</button>
      <div class="dr-id"><div class="ring ${a.status === 'busy' ? 'breathe' : ''}" style="--st:${st.c};width:58px;height:58px">${ringSVG(a.used, a.max, st.c, 58)}<div class="face" style="background:linear-gradient(135deg,${g1},${g2})"><span>${initials(a.name)}</span><img src="${a.photo}" alt="" onerror="this.remove()"></div></div>
        <div><div class="nm">${a.name}</div><div class="rl">${a.role}</div><div class="status-pill" style="color:${st.c};background:color-mix(in srgb,${st.c} 12%,transparent)"><i style="background:${st.c}"></i>${st.lbl}</div></div></div>
    </div>
    <div class="dr-actions"><button class="primary">⚑ Atendre bandera</button><button>↪ Reassignar</button><button>≋ Canviar cues</button><button>✦ Canviar skills</button></div>
    <div class="dr-body">
      <section><h4>Resum d'activitat</h4><div class="stat-grid">
        <div class="s"><div class="v" style="color:${st.c}">${a.used}/${a.max}</div><div class="k">Capacitat</div></div>
        <div class="s"><div class="v">${a.status === 'offline' ? '—' : fmtLogin(a.loginMin)}</div><div class="k">Loguejat</div></div>
        <div class="s"><div class="v">${a.lastAccept == null ? '—' : a.lastAccept + 'm'}</div><div class="k">Última feina</div></div>
      </div></section>
      <section><h4>Cues assignades</h4><div style="display:flex;gap:7px;flex-wrap:wrap">${[...new Set(a.queues)].map(q => `<span class="pill-q" style="color:${qById(q).color};background:color-mix(in srgb,${qById(q).color} 12%,transparent)">${qById(q).name}</span>`).join('')}</div></section>
      <section><h4>Timeline — últimes 3 h</h4>
        <div class="tl-axis"><span>-3h</span><span>-2h</span><span>-1h</span><span>ara</span></div>
        <div class="tl-lane-lbl"><i style="width:7px;height:7px;border-radius:50%;background:var(--watch)"></i>Estat de presència</div>${timelineLane(stB)}
        <div class="tl-lane-lbl"><i style="width:7px;height:7px;border-radius:50%;background:var(--accent)"></i>Feina atesa</div>${timelineLane(wkB)}
      </section>
      <section><h4>Feina activa (${items.length})</h4><div class="worklist">${items.map(w => `<div class="wi"><div class="wic">${w.ic}</div><div class="info"><div class="t">${w.t}</div><div class="m">${CH_LBL[Object.keys(CH).find(k => CH[k] === w.ic)] || 'Canal'}</div></div><span class="pill-q" style="color:${qById(w.q).color};background:color-mix(in srgb,${qById(w.q).color} 12%,transparent)">${qById(w.q).name}</span><span class="age mono">${w.age}m</span></div>`).join('')}</div></section>
    </div>`;
      document.getElementById('drawer').classList.add('show'); document.getElementById('scrim').classList.add('show');
    }
    function closeDrawer() { document.getElementById('drawer').classList.remove('show'); document.getElementById('scrim').classList.remove('show'); }
    document.getElementById('scrim').onclick = closeDrawer;
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    /* ───────── Room — isometric workload map ───────── */
    const shade = (c, f) => c.map(v => Math.round(v * f));
    const tint = (c, k) => c.map(v => Math.round(v + (255 - v) * k));
    const rgbc = (c, o = 1) => `rgba(${c[0]},${c[1]},${c[2]},${o})`;

    let buildDir = 0, dirAnimating = false;
    function setBuildDir(d) {
      if (d === buildDir || dirAnimating) return;
      const canvas = document.querySelector('.room-canvas');
      if (!canvas) { buildDir = d; if (current === 'overview') updateOverview(); else updateRoomPanel(); return; }
      dirAnimating = true;
      const compassDeg = [90, 0, 180, 270];
      let delta = ((compassDeg[d] - compassDeg[buildDir]) + 360) % 360;
      if (delta > 180) delta -= 360;
      const outDeg = delta > 0 ? -90 : 90;
      const inDeg = delta > 0 ? 90 : -90;
      const DUR = 190;
      canvas.style.transformOrigin = 'center 40%';
      canvas.style.transition = `transform ${DUR}ms ease-in, opacity ${DUR}ms ease-in`;
      canvas.style.transform = `perspective(700px) rotateY(${outDeg}deg) scaleX(0.6)`;
      canvas.style.opacity = '0.2';
      setTimeout(() => {
        buildDir = d;
        const b = buildBuilding();
        canvas.innerHTML = b.svg;
        attachSeats();
        document.querySelectorAll('.bldg-compass button').forEach((btn, i) => {
          btn.classList.toggle('on', [1, 0, 3, 2][i] === d);
        });
        canvas.style.transition = 'none';
        canvas.style.transform = `perspective(700px) rotateY(${inDeg}deg) scaleX(0.6)`;
        canvas.style.opacity = '0.2';
        requestAnimationFrame(() => requestAnimationFrame(() => {
          canvas.style.transition = `transform ${DUR}ms ease-out, opacity ${DUR}ms ease-out`;
          canvas.style.transform = 'perspective(700px) rotateY(0deg) scaleX(1)';
          canvas.style.opacity = '1';
          setTimeout(() => {
            canvas.style.transition = '';
            canvas.style.transform = '';
            canvas.style.opacity = '';
            dirAnimating = false;
          }, DUR);
        }));
      }, DUR);
    }

    function buildBuilding(dir) {
      if (dir === undefined) dir = buildDir;
      const TW = 34, TH = 17, minH = 16, maxH = 88, THK = 6, GAP = 230;
      let gMaxC = 0, gMaxR = 0;
      FLOORS.forEach(f => f.cells.forEach(([c, r]) => { if (c > gMaxC) gMaxC = c; if (r > gMaxR) gMaxR = r; }));
      const getPos =
        dir === 1 ? (c, r) => [(r - c) * TW, (r + c) * TH] :
        dir === 2 ? (c, r) => [(gMaxR - r - c) * TW, (gMaxR - r + c) * TH] :
        dir === 3 ? (c, r) => [(r + c - gMaxC) * TW, (r + gMaxC - c) * TH] :
                    (c, r) => [(c - r) * TW, (c + r) * TH];
      const makeRfVis = has =>
        dir === 1 ? (c, r) => !has(c, r + 1) :
        dir === 2 ? (c, r) => !has(c, r - 1) :
        dir === 3 ? (c, r) => !has(c, r + 1) :
                    (c, r) => !has(c + 1, r);
      const makeLfVis = has =>
        dir === 1 ? (c, r) => !has(c + 1, r) :
        dir === 2 ? (c, r) => !has(c + 1, r) :
        dir === 3 ? (c, r) => !has(c - 1, r) :
                    (c, r) => !has(c, r + 1);
      const sortFn =
        dir === 2 ? (a, b) => (a.c - a.r) - (b.c - b.r) || (a.c - b.c) :
        dir === 3 ? (a, b) => (a.r - a.c) - (b.r - b.c) || (a.r - b.r) :
                    (a, b) => (a.c + a.r) - (b.c + b.r) || (a.c - b.c);
      let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
      const ext = (x, y) => { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; };
      const faces = (x, y, H) => ({ top: `${x},${y - TH - H} ${x + TW},${y - H} ${x},${y + TH - H} ${x - TW},${y - H}`, lf: `${x - TW},${y} ${x},${y + TH} ${x},${y + TH - H} ${x - TW},${y - H}`, rf: `${x},${y + TH} ${x + TW},${y} ${x + TW},${y - H} ${x},${y + TH - H}` });
      const mkBeacon = (x, y, H) => { const by = y - TH - H - 15; return `<line x1="${x}" y1="${y - TH - H}" x2="${x}" y2="${by + 4}" stroke="#E05641" stroke-width="1.5"/><circle class="beacon" cx="${x}" cy="${by}" r="5" fill="#E05641" stroke="#fff" stroke-width="1.5"/>`; };
      const wire = (x, y, H, stroke, id, vacant, beacon) => { const p = faces(x, y, H); return `<g class="seat" ${id ? `data-id="${id}"` : ''}><polygon points="${p.rf}" fill="none" stroke="${stroke}"/><polygon points="${p.lf}" fill="none" stroke="${stroke}"/><polygon points="${p.top}" fill="rgba(255,255,255,.35)" stroke="${stroke}"/>${vacant ? '<title>Lloc lliure</title>' : ''}${beacon || ''}</g>`; };
      const band = (x, y, h1, h2, oL, oR, T, stroke) => `<polygon points="${x},${y + TH - h1} ${x + TW},${y - h1} ${x + TW},${y - h2} ${x},${y + TH - h2}" fill="${rgbc(shade(T, .72), oR)}"${stroke ? ` stroke="${stroke}"` : ''}/><polygon points="${x - TW},${y - h1} ${x},${y + TH - h1} ${x},${y + TH - h2} ${x - TW},${y - h2}" fill="${rgbc(shade(T, .92), oL)}"${stroke ? ` stroke="${stroke}"` : ''}/>`;
      const tower = (x, y, H, T, L, id, beacon) => {
        const baseH = 14, capH = 16, edge = rgbc(shade(T, .5), .3); let s = '';
        if (H <= baseH + capH) { s += band(x, y, 0, H, .86, .86, T, edge); }
        else { s += band(x, y, 0, baseH, .88, .88, T, edge); s += band(x, y, baseH, H - capH, .26, .22, T, ''); s += band(x, y, H - capH, H, .86, .86, T, edge); }
        const top = `${x},${y - TH - H} ${x + TW},${y - H} ${x},${y + TH - H} ${x - TW},${y - H}`;
        s += `<polygon points="${top}" fill="${rgbc(tint(T, .22), .95)}" stroke="rgba(255,255,255,.6)"/>`;
        if (L >= 1) s += `<polygon points="${top}" fill="none" stroke="#E05641" stroke-width="2"/>`;
        return `<g class="seat" data-id="${id}">${s}${beacon || ''}</g>`;
      };

      let body = '', labels = '', occupied = 0, hot = 0;
      FLOORS.forEach((f, i) => {
        const yOff = -i * GAP; const has = (c, r) => f.cellset.has(c + ',' + r);
        const rfVis = makeRfVis(has); const lfVis = makeLfVis(has);
        let fGround = '', fShadow = '', fGlow = '', fCubes = '', lvx = 1e9, lvy = 0;
        f.cells.forEach(([c, r]) => {
          const [x0, y0] = getPos(c, r); const y = y0 + yOff;
          fGround += `<polygon points="${x0},${y - TH} ${x0 + TW},${y} ${x0},${y + TH} ${x0 - TW},${y}" fill="rgba(247,246,243,.4)" stroke="rgba(27,25,36,.09)"/>`;
          if (rfVis(c, r)) fGround += `<polygon points="${x0 + TW},${y} ${x0},${y + TH} ${x0},${y + TH + THK} ${x0 + TW},${y + THK}" fill="rgba(27,25,36,.05)"/>`;
          if (lfVis(c, r)) fGround += `<polygon points="${x0 - TW},${y} ${x0},${y + TH} ${x0},${y + TH + THK} ${x0 - TW},${y + THK}" fill="rgba(27,25,36,.08)"/>`;
          if (x0 - TW < lvx) { lvx = x0 - TW; lvy = y; }
          ext(x0 - TW, y - TH); ext(x0 + TW, y + TH + THK);
        });
        const seats = f.assigned.slice().sort(sortFn);
        seats.forEach(s => {
          const a = s.agent; const [x0, y0] = getPos(s.c, s.r); const y = y0 + yOff;
          fShadow += `<ellipse cx="${x0}" cy="${y + 2}" rx="${TW * .86}" ry="${TH * .86}" fill="rgba(27,25,36,.05)" filter="url(#bg)"/>`;
          if (!a) { fCubes += `<g class="seat"><polygon points="${x0},${y - TH * .58} ${x0 + TW * .58},${y} ${x0},${y + TH * .58} ${x0 - TW * .58},${y}" fill="none" stroke="rgba(27,25,36,.22)" stroke-dasharray="3 3"/><title>Lloc lliure</title></g>`; return; }
          const T = TEAM_COLOR[teamOf(a)] || [140, 140, 150];
          if (a.status === 'offline') { fCubes += wire(x0, y, 10, 'rgba(27,25,36,.18)', a.id, false, a.flag ? mkBeacon(x0, y, 10) : ''); return; }
          const L = a.max ? a.used / a.max : 0; occupied++; if (L >= .8) hot++;
          const H = minH + L * (maxH - minH); const beacon = a.flag ? mkBeacon(x0, y, L < .1 ? minH : H) : '';
          if (L < .1) { fCubes += wire(x0, y, minH, rgbc(shade(T, .7), .5), a.id, false, beacon); return; }
          fGlow += `<ellipse cx="${x0}" cy="${y}" rx="${TW * 1.2}" ry="${TH * 1.2}" fill="${rgbc(T, L * .42)}" filter="url(#bg)"/>`;
          fCubes += tower(x0, y, H, T, L, a.id, beacon); ext(x0, y - TH - H - 24);
        });
        body += fGround + fShadow + fGlow + fCubes;
        labels += `<text x="${lvx - 12}" y="${lvy + 4}" text-anchor="end" class="floor-lbl">${f.name}</text>`;
        ext(lvx - 96, lvy);
      });
      const pad = 30, vb = `${minX - pad} ${minY - pad} ${(maxX - minX) + pad * 2} ${(maxY - minY) + pad * 2}`;
      const svg = `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg"><defs><filter id="bg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9"/></filter></defs><g>${body}</g><g>${labels}</g></svg>`;
      return { svg, occupied, hot };
    }
    function attachSeats() {
      const tip = document.getElementById('roomTip');
      document.querySelectorAll('.seat[data-id]').forEach(g => {
        const a = AGENTS.find(x => x.id === g.dataset.id);
        g.addEventListener('mousemove', e => {
          const load = a.max ? Math.round(a.used / a.max * 100) : 0;
          tip.innerHTML = `<div class="tip-row"><img class="tip-av" src="${a.photo}" alt="" onerror="this.style.visibility='hidden'"><div><div class="tn">${a.name}${a.flag ? ' ⚑' : ''}</div><div class="tm">${a.role}</div></div></div><div class="tl">${a.status === 'offline' ? 'Desconnectat · ' + teamOf(a) : a.used + '/' + a.max + ' · ' + load + '% · ' + teamOf(a)}</div>`;
          tip.style.display = 'block'; tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY + 14) + 'px';
        });
        g.addEventListener('mouseleave', () => tip.style.display = 'none');
        g.addEventListener('click', () => { tip.style.display = 'none'; openDrawer(a.id); });
      });
    }

    /* ───────── Router ───────── */
    let current = 'overview';
    function go(v, anchor) {
      if (v !== 'overview') Scene3D.dispose();
      current = v;
      document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('on', b.dataset.view === v));
      if (v === 'overview') renderOverview();
      else if (v === 'detail') renderDetail();
      else renderPlaceholder(v);
      if (anchor && v === 'detail') { const el = document.getElementById('sec-' + anchor); if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; } }
      if (v !== 'detail') window.scrollTo(0, 0);
    }
    document.querySelectorAll('#nav button').forEach(b => b.onclick = () => go(b.dataset.view));
    // quick search jumps to agents
    document.getElementById('qsearch').addEventListener('input', e => {
      filter.q = e.target.value;
      if (current !== 'detail') go('detail', 'agents');
      else updateAgents();
    });

    /* ───────── Live sim ───────── */
    function tickClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ca-ES', { hour12: false }); }
    function tickWork() {
      AGENTS.forEach(a => { if (a.work) a.workSec++; });
      document.querySelectorAll('.card').forEach(c => { const a = AGENTS.find(x => x.id === c.dataset.id); if (a && a.work) { const t = c.querySelector('.timer'); if (t) t.textContent = fmtDur(a.workSec); } });
    }
    function tickQueues() {
      queueState.forEach(q => {
        if (q.backlog > 0) q.longest += rnd(1, 4);
        q.avg = Math.max(15, q.avg + rnd(-3, 3));
        if (Math.random() < .35) q.backlog = Math.max(0, q.backlog + rnd(-1, 1));
        if (Math.random() < .2) q.online = Math.max(1, q.online + (Math.random() < .5 ? -1 : 1));
      });
      if (current === 'overview') updateOverview(); else if (current === 'detail') { const qg = document.querySelector('#sec-queues .qgrid'); if (qg) qg.innerHTML = queueState.map(queueCard).join(''); updateRoomPanel(); }
    }
    function maybeFlag() {
      const on = AGENTS.filter(a => a.status === 'online' && !a.flag);
      if (Math.random() < .4 && on.length) {
        const a = pick(on); a.flag = true;
        a.flagReason = pick(['Client irat — demana responsable', 'Dubte sobre devolucions', 'Cas fora del seu skill', 'Aprovació de descompte']);
        if (current === 'detail') { updateAgents(); updateRoomPanel(); } else if (current === 'overview') updateOverview();
      }
    }

    tickClock(); renderOverview();
    setInterval(tickClock, 1000);
    setInterval(tickWork, 1000);
    setInterval(tickQueues, 5000);
    setInterval(maybeFlag, 16000);
  </script>
</body>
